server:
  port: 8080

spring:
  profiles:
    active: dev

  # 数据源 Druid
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      driver-class-name: com.mysql.cj.jdbc.Driver
      url: jdbc:mysql://localhost:3306/mall?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false
      username: root
      password: 2736
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        login-username: admin
        login-password: admin
      filter:
        stat:
          enabled: true
          log-slow-sql: true
          slow-sql-millis: 1000
        wall:
          enabled: true

  # Redis
  data:
    redis:
      host: 192.168.216.129
      port: 6379
      password: 273621
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # 文件上传
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

# MyBatis
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.mall.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# PageHelper
pagehelper:
  helper-dialect: mysql
  reasonable: true
  support-methods-arguments: true
  params: count=countSql

# Shiro
shiro:
  enabled: true
  web:
    enabled: true
  login-url: /api/common/auth/unLogin
  success-url: /
  unauthorized-url: /api/common/auth/unauthorized

# JWT
jwt:
  secret: mall-jwt-secret-key-2024-shopping-mall-system
  expiration: 604800000
  header: Authorization
  prefix: Bearer

# 文件上传路径
mall:
  upload:
    path: D:/mall-upload/
    allow-types: jpg,jpeg,png,gif,webp

# Knife4j
knife4j:
  enable: true
  setting:
    language: zh-CN

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
